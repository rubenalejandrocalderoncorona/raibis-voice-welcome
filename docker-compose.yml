version: "3.9"

services:
  raibis-voice-welcome:
    build: .
    image: raibis-voice-welcome:latest
    container_name: raibis-voice-welcome
    restart: unless-stopped
    # Pass through the host microphone via PulseAudio (Linux)
    # On macOS run natively (see GUIDE.md)
    devices:
      - /dev/snd:/dev/snd
    environment:
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR}/pulse/native
    volumes:
      - ${XDG_RUNTIME_DIR}/pulse/native:${XDG_RUNTIME_DIR}/pulse/native
      - ${HOME}/.config/pulse/cookie:/root/.config/pulse/cookie
    network_mode: host
